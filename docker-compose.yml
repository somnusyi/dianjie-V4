version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dianjie_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dianjie
      POSTGRES_USER: dianjie
      POSTGRES_PASSWORD: dianjie_dev_2024
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dianjie']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dianjie_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
