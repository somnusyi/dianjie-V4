# ══════════════════════════════════════════════════════
# 滇界云管 · Nginx 生产配置
# 部署位置：/etc/nginx/conf.d/dianjie.conf
# 部署命令：sudo cp deploy/nginx.conf /etc/nginx/conf.d/dianjie.conf && sudo nginx -t && sudo nginx -s reload
# ══════════════════════════════════════════════════════

server {
    listen 80;
    server_name 116.62.32.162;

    client_max_body_size 20M;

    # ── Gzip 压缩 ──────────────────────────────────
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/json application/javascript application/x-javascript application/xml image/svg+xml;

    # ── 安全响应头 ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Next.js 静态资源（长期缓存）────────────────
    # _next/static/ 下的文件名含 content hash，内容变化时文件名自动变
    # 可以安全地设置 1 年缓存，浏览器不会用到过期的旧文件
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── 图片等静态文件缓存 ─────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── API 接口（不缓存）─────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # API 禁止缓存
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── 健康检查 ───────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:4000;
        access_log off;
    }

    # ── 前端页面（Next.js）─────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
